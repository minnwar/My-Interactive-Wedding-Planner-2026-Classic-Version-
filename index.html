// INITIALIZATION
// =============================================

function initBackupReminder() {
  var banner = document.getElementById('backupReminderBanner');
  if (!banner) return;

  var lastExport = localStorage.getItem('weddingPlannerLastBackup');
  var lastDismissed = localStorage.getItem('weddingPlannerReminderDismissed');
  var now = Date.now();
  var sevenDays = 7 * 24 * 60 * 60 * 1000;
  var oneDay = 24 * 60 * 60 * 1000;

  // Show reminder if: never exported and 3 days since setup, or 7+ days since last export
  // Don't show if dismissed within last 24 hours
  var shouldShow = false;
  if (lastDismissed && (now - parseInt(lastDismissed, 10)) < oneDay) {
    shouldShow = false;
  } else if (!lastExport) {
    var setupTime = parseInt(localStorage.getItem('weddingPlannerLastSaved') || '0', 10);
    if (setupTime && (now - setupTime) > 3 * oneDay) shouldShow = true;
  } else if ((now - parseInt(lastExport, 10)) > sevenDays) {
    shouldShow = true;
  }

  if (shouldShow) {
    banner.style.display = 'flex';
    document.getElementById('backupReminderText').innerHTML = '📦 ' + t('backupReminderText');
    document.getElementById('backupExportBtn').textContent = t('backupExportNow');
    document.getElementById('backupDismissBtn').textContent = t('backupDismiss');
  }

  document.getElementById('backupExportBtn').addEventListener('click', function() {
    exportBackup();
    banner.style.display = 'none';
  });

  document.getElementById('backupDismissBtn').addEventListener('click', function() {
    banner.style.display = 'none';
    localStorage.setItem('weddingPlannerReminderDismissed', String(Date.now()));
  });
}

function exportBackup() {
  var dataStr = JSON.stringify(appData, null, 2);
  var blob = new Blob([dataStr], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var coupleSlug = (appData.coupleName || 'MyWedding').replace(/[^a-zA-Z0-9\s&]/g, '').replace(/\s+/g, '_').trim();
  var saveDate = new Date().toISOString().slice(0,10);
  a.download = coupleSlug + '_' + saveDate + '_MyWeddingPlanner.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('weddingPlannerLastBackup', String(Date.now()));
  showToast(t('dataExported'), 'success');
}

// Update the relative time display every 30 seconds
setInterval(function() {
  updateSaveIndicator();
}, 30000);

function initApp() {
  loadData();

  // Restore last saved time
  var savedTs = localStorage.getItem('weddingPlannerLastSaved');
  if (savedTs) _lastSaveTime = parseInt(savedTs, 10);

  if (appData.setupComplete) {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildSidebar();
    var topTitle = document.getElementById('topbarTitle');
    if (topTitle) topTitle.innerHTML = t('appTitle');
    showSection('dashboard');
    updateSaveIndicator();
    initBackupReminder();
  } else {
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    initWelcomeForm();
  }

  // Language selector on welcome screen
  var langSelect = document.getElementById('langSelectWelcome');
  if (langSelect) {
    langSelect.value = currentLang;
    langSelect.addEventListener('change', function() {
      var newLang = langSelect.value;
      setLanguage(newLang);
      var langLbl = document.getElementById('langLabel');
      if (langLbl) langLbl.textContent = t('language');
      var wTitle = document.querySelector('.welcome-title');
      if (wTitle) wTitle.textContent = t('welcomeTitle');
      var wSub = document.querySelector('.welcome-sub');
      if (wSub) wSub.textContent = t('welcomeSub');
      var cLabel = document.querySelector('#setupForm .welcome-section:first-child h3');
      if (cLabel) cLabel.textContent = t('couple');
      var edLabel = document.querySelector('#setupForm .welcome-section:nth-child(2) h3');
      if (edLabel) edLabel.textContent = t('eventDetails');
      var bLabel = document.querySelector('#setupForm .welcome-section:nth-child(3) h3');
      if (bLabel) bLabel.textContent = t('budget');
      var subBtn = document.querySelector('.welcome-submit');
      if (subBtn) subBtn.textContent = t('letsStart');
    });
  }

  // Hamburger
  document.getElementById('hamburgerBtn').addEventListener('click', function() {
    var sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  });

  // Sidebar overlay
  document.getElementById('sidebarOverlay').addEventListener('click', function() {
    closeSidebar();
  });

  // Modal overlay close
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === document.getElementById('modalOverlay')) {
      closeModal();
    }
  });

  // Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal();
      closeSidebar();
    }
  });
}

function initWelcomeForm() {
  document.getElementById('setupForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Clear errors
    document.getElementById('err-couple').classList.remove('show');
    document.getElementById('err-date').classList.remove('show');
    document.getElementById('err-venue').classList.remove('show');
    document.getElementById('err-budget').classList.remove('show');
    document.getElementById('err-couple').textContent = '';
    document.getElementById('err-date').textContent = '';
    document.getElementById('err-venue').textContent = '';
    document.getElementById('err-budget').textContent = '';

    var couple = document.querySelector('[name="coupleName"]').value.trim();
    var date = document.querySelector('[name="weddingDate"]').value;
    var venue = document.querySelector('[name="venue"]').value.trim();
    var budget = parseFloat(document.querySelector('[name="totalBudget"]').value);

    var valid = true;

    if (!couple) {
      document.getElementById('err-couple').textContent = t('errCoupleRequired');
      document.getElementById('err-couple').classList.add('show');
      valid = false;
    }

    if (!date) {
      document.getElementById('err-date').textContent = t('errDateRequired');
      document.getElementById('err-date').classList.add('show');
      valid = false;
    } else {
      var d = new Date(date + 'T00:00:00');
      if (isNaN(d.getTime())) {
        document.getElementById('err-date').textContent = t('invalidDate');
        document.getElementById('err-date').classList.add('show');
        valid = false;
      }
    }

    if (!venue) {
      document.getElementById('err-venue').textContent = t('errVenueRequired');
      document.getElementById('err-venue').classList.add('show');
      valid = false;
    }

    if (!budget || budget <= 0 || isNaN(budget)) {
      document.getElementById('err-budget').textContent = t('errBudgetRequired');
      document.getElementById('err-budget').classList.add('show');
      valid = false;
    }

    if (!valid) return;

    appData.coupleName = couple;
    appData.weddingDate = date;
    appData.venue = venue;
    appData.totalBudget = budget;
    appData.setupComplete = true;
    appData.budgetCategories = buildDefaultBudget();
    appData.timelineTasks = buildDefaultTimeline();
    appData.guests = [];

    saveData();

    document.getElementById('welcome').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildSidebar();
    showSection('dashboard');
  });
}

// Start
document.addEventListener('DOMContentLoaded', function() {
  initApp();
});
</script>
